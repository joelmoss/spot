name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build arm64
        run: swift build -c release --arch arm64

      - name: Build x86_64
        run: swift build -c release --arch x86_64

      - name: Create universal binary
        run: |
          mkdir -p build
          lipo -create \
            .build/arm64-apple-macosx/release/Spot \
            .build/x86_64-apple-macosx/release/Spot \
            -output build/Spot

      - name: Assemble app bundle
        run: |
          APP_BUNDLE="build/Spot.app"
          mkdir -p "${APP_BUNDLE}/Contents/MacOS"
          mkdir -p "${APP_BUNDLE}/Contents/Resources"
          mkdir -p "${APP_BUNDLE}/Contents/Frameworks"
          cp build/Spot "${APP_BUNDLE}/Contents/MacOS/Spot"
          cp Info.plist "${APP_BUNDLE}/Contents/Info.plist"
          cp Sources/Spot/Resources/AppIcon.icns "${APP_BUNDLE}/Contents/Resources/"

          SPARKLE_PATH=$(find .build -name "Sparkle.framework" -type d | head -1)
          if [ -z "$SPARKLE_PATH" ]; then
            echo "::error::Sparkle.framework not found in .build"
            exit 1
          fi
          cp -R "$SPARKLE_PATH" "${APP_BUNDLE}/Contents/Frameworks/"
          install_name_tool -add_rpath @executable_path/../Frameworks "${APP_BUNDLE}/Contents/MacOS/Spot"

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Sign app bundle
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          IDENTITY="Developer ID Application: Joel Moss (${TEAM_ID})"
          APP_BUNDLE="build/Spot.app"
          SPARKLE_FW="${APP_BUNDLE}/Contents/Frameworks/Sparkle.framework"

          # Sign Sparkle framework components inside-out (if present)
          if [ -d "$SPARKLE_FW" ]; then
            find "$SPARKLE_FW" -type f -perm +111 -o -name "*.xpc" -o -name "*.app" | while read item; do
              codesign --force --options runtime --timestamp --sign "$IDENTITY" "$item" 2>/dev/null || true
            done
            codesign --force --options runtime --timestamp --sign "$IDENTITY" "$SPARKLE_FW"
          fi

          # Sign the app
          codesign --force --options runtime --timestamp \
            --sign "$IDENTITY" \
            --entitlements scripts/entitlements.plist \
            "${APP_BUNDLE}"

          codesign --verify --deep --strict "${APP_BUNDLE}"

      - name: Create DMG
        run: |
          hdiutil create -volname "Spot" \
            -srcfolder "build/Spot.app" \
            -ov -format UDZO \
            "build/Spot.dmg" \
            -quiet

      - name: Sign DMG
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          codesign --force --timestamp \
            --sign "Developer ID Application: Joel Moss (${TEAM_ID})" \
            build/Spot.dmg

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit build/Spot.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait
          xcrun stapler staple build/Spot.dmg

      - name: Create ZIP for Sparkle
        run: |
          cd build
          ditto -c -k --sequesterRsrc --keepParent Spot.app Spot.zip

      - name: Sign update and generate appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          FILE_SIZE=$(stat -f%z build/Spot.zip)
          DOWNLOAD_URL="https://github.com/joelmoss/spot/releases/download/${GITHUB_REF_NAME}/Spot.zip"

          # Find sign_update tool from Sparkle build artifacts
          SIGN_UPDATE=$(find .build -name "sign_update" -type f | head -1)

          if [ -n "$SIGN_UPDATE" ]; then
            chmod +x "$SIGN_UPDATE"
            SIGNATURE=$( echo "$SPARKLE_PRIVATE_KEY" | "$SIGN_UPDATE" build/Spot.zip -f - )
          else
            echo "::warning::sign_update not found — appcast will lack EdDSA signature"
            SIGNATURE=""
          fi

          cat > appcast.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>Spot</title>
              <link>https://raw.githubusercontent.com/joelmoss/spot/main/appcast.xml</link>
              <description>Spot updates</description>
              <language>en</language>
              <item>
                <title>Version ${VERSION}</title>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <pubDate>$(date -R)</pubDate>
                <enclosure url="${DOWNLOAD_URL}" length="${FILE_SIZE}" type="application/octet-stream" sparkle:edSignature="${SIGNATURE}" />
              </item>
            </channel>
          </rss>
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/Spot.dmg
            build/Spot.zip
          generate_release_notes: true
          body: |
            ## Installation

            1. Download **Spot.dmg** and drag Spot to Applications
            2. Launch Spot from Applications

      - name: Update appcast on main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp appcast.xml /tmp/appcast.xml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          cp /tmp/appcast.xml appcast.xml
          git add appcast.xml
          git commit -m "Update appcast.xml for ${GITHUB_REF_NAME}"
          git push origin main
